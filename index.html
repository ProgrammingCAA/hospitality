<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospitality Order</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
.active{
  background:#1e2e1b !important;
  color:white !important;
}

/* خلفية صورة */
body{
  background:
    linear-gradient(rgba(10,30,80,0.7), rgba(10,30,80,0.7)),
    url("https://raw.githubusercontent.com/sheikha-khalifa/hospitality/main/bg.jpg");
    
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}
body{
  margin:0;
  min-height:100vh;
  background: url("https://raw.githubusercontent.com/sheikha-khalifa/hospitality/main/bg.jpg") center center fixed;
  background-size: cover;
  position: relative;
}

/* طبقة تغميق زرقاء فوق الصورة */
body::before{
  content:"";
  position: fixed;
  inset:0;
  background: rgba(5,20,60,0.75); /* أزرق غامق */
  z-index:-1;
}

</style>

</head>

<body class="min-h-screen p-6 flex items-center justify-center">

<div class="w-full max-w-md p-8 rounded-3xl shadow-2xl text-white"
     style="background-color:rgba(126,180,214,0.85); backdrop-filter: blur(6px);">



  <!-- لوجو أكبر -->
  <div class="flex justify-center mb-6">
    <img src="https://sheikha-khalifa.github.io/hospitality/caa_logo.png" class="h-32">
  </div>

  <h1 class="text-3xl font-bold text-center mb-8">Hospitality Order</h1>
<div class="grid grid-cols-2 gap-4 mb-6">

<button type="button" class="drink bg-white text-blue-900 p-4 rounded-xl shadow hover:scale-105 transition" data-drink="Black Coffee">Black Coffee</button>

<button class="drink bg-white text-blue-900 p-4 rounded-xl shadow hover:scale-105 transition" data-drink="Omani Coffee">Omani Coffee</button>

<button class="drink bg-white text-blue-900 p-4 rounded-xl shadow hover:scale-105 transition" data-drink="Green Tea">Green Tea</button>

<button class="drink bg-white text-blue-900 p-4 rounded-xl shadow hover:scale-105 transition" data-drink="Milk Tea">Milk Tea</button>

<button class="drink bg-white text-blue-900 p-4 rounded-xl shadow hover:scale-105 transition" data-drink="Black Tea">Black Tea</button>

<button class="drink bg-white text-blue-900 p-4 rounded-xl shadow hover:scale-105 transition" data-drink="Saatar Tea">Saatar Tea</button>

<button class="drink bg-white text-blue-900 p-4 rounded-xl shadow hover:scale-105 transition" data-drink="Cappuccino">Cappuccino</button>

<button class="drink bg-white text-blue-900 p-4 rounded-xl shadow hover:scale-105 transition" data-drink="Espresso">Espresso</button>
<button class="drink bg-white text-blue-900 p-4 rounded-xl shadow hover:scale-105 transition" data-drink="Water">Water</button>
</div>



  <p class="mb-2 text-lg font-semibold">Sugar</p>
  <div class="flex gap-2 mb-4">
    <button class="sugar bg-white text-blue-900 px-4 py-2 rounded-xl shadow hover:scale-105 transition" data-value="No Sugar">No Sugar</button>
    <button class="sugar bg-white text-blue-900 px-4 py-2 rounded-xl shadow hover:scale-105 transition" data-value="Medium">Medium</button>
    <button class="sugar bg-white text-blue-900 px-4 py-2 rounded-xl shadow hover:scale-105 transition" data-value="Extra">Extra</button>
  </div>

  <p class="mb-2 text-lg font-semibold">Milk</p>
  <div class="flex gap-2 mb-4">
    <button class="milk bg-white text-blue-900 px-4 py-2 rounded-xl shadow hover:scale-105 transition" data-value="No Milk">No Milk</button>
    <button class="milk bg-white text-blue-900 px-4 py-2 rounded-xl shadow hover:scale-105 transition" data-value="Little">Little</button>
    <button class="milk bg-white text-blue-900 px-4 py-2 rounded-xl shadow hover:scale-105 transition" data-value="More">More</button>
  </div>

  <textarea id="notes" placeholder="Notes"
  class="w-full p-3 rounded-xl text-black mb-4 shadow-inner" rows="3"></textarea>

  <!-- زر أخضر -->
  <button id="send"
  class="w-full text-white py-3 rounded-xl font-bold hover:bg-[#5a5d31] transition text-lg"
  style="background-color: #474b25;">
  Send Order
</button>


</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
 apiKey:"AIzaSyCxOPyURMd40ee9XS-BudTELbJUjXyBUak",
 authDomain:"hospitality-43fca.firebaseapp.com",
 databaseURL:"https://hospitality-43fca-default-rtdb.firebaseio.com",
 projectId:"hospitality-43fca",
 storageBucket:"hospitality-43fca.firebasestorage.app",
 messagingSenderId:"1065891444452",
 appId:"1:1065891444452:web:8c5661e66e186ede115ef1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const params = new URLSearchParams(window.location.search);
const tableNumber = params.get("table");

let selectedDrink = "", sugar = "", milk = "";

document.querySelectorAll(".drink").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".drink").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    selectedDrink = btn.dataset.drink;
  };
});

document.querySelectorAll(".sugar").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".sugar").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    sugar = btn.dataset.value;
  };
});

document.querySelectorAll(".milk").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".milk").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    milk = btn.dataset.value;
  };
});

document.getElementById("send").onclick=()=>{
  if(!selectedDrink){
    alert("اختاري المشروب");
    return;
  }
  if(!tableNumber){
    alert("رقم الطاولة غير موجود!");
    return;
  }

  push(ref(db,"orders"),{
    table: tableNumber,
    drink: selectedDrink,
    sugar,
    milk,
    notes: document.getElementById("notes").value,
    time: new Date().toLocaleTimeString()
  });

  alert("✅ تم إرسال الطلب");

  document.querySelectorAll(".drink, .sugar, .milk").forEach(b=>b.classList.remove("active"));
  selectedDrink = sugar = milk = "";
  document.getElementById("notes").value = "";
};
</script>

</body>
</html>
