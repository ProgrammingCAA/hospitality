<!DOCTYPE html>

<button class="drink bg-white text-blue-900 p-3 rounded-xl shadow hover:scale-105 transition flex flex-col items-center" data-drink="Black Coffee">

<p class="text-xl font-semibold mb-3">Tea</p>

<div class="grid grid-cols-3 gap-4 mb-6">

<button id="GreenTeabtn" class="drink president-only bg-white text-blue-900 p-3 rounded-xl shadow hover:scale-105 transition flex flex-col items-center" data-drink="Green Tea">

Peppermint
</span>

<button class="drink bg-white text-blue-900 p-3 rounded-xl shadow hover:scale-105 transition flex flex-col items-center" data-drink="Zaatar Tea">

<p class="text-xl font-semibold mb-3">Other</p>
<button class="drink bg-white text-blue-900 p-3 rounded-xl shadow hover:scale-105 transition flex flex-col items-center" data-drink="Water">

<span class="text-sm font-semibold">Water</span>

  <p class="mb-2 text-lg font-semibold">Sugar</p>
  <div class="flex gap-2 mb-4">
    <button class="sugar bg-white text-blue-900 px-4 py-2 rounded-xl shadow hover:scale-105 transition" data-value="No Sugar">Sugar</button>
    <button class="sugar bg-white text-blue-900 px-4 py-2 rounded-xl shadow hover:scale-105 transition" data-value="Medium">No Sugar</button>
    </div>


  <textarea id="notes" placeholder="Notes"
  class="w-full p-3 rounded-xl text-black mb-4 shadow-inner" rows="3"></textarea>

  <!-- زر أخضر -->
  <button id="send"
  class="w-full text-white py-3 rounded-xl font-bold hover:bg-[#5a5d31] transition text-lg"
  style="background-color: #8a9152;">
  Send Order
</button>


</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

 authDomain:"hospitality-43fca.firebaseapp.com",
 databaseURL:"https://hospitality-43fca-default-rtdb.firebaseio.com",
 projectId:"hospitality-43fca",
 storageBucket:"hospitality-43fca.firebasestorage.app",
 messagingSenderId:"1065891444452",
 appId:"1:1065891444452:web:8c5661e66e186ede115ef1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const params = new URLSearchParams(window.location.search);
const tableNumber = params.get("table");
  
// اظهار Peppermint فقط للرئيس
const presidentButtons = document.querySelectorAll(".president-only");
const isPresident =
    tableNumber &&
    (
      tableNumber.toLowerCase() === "president" ||
      tableNumber.toLowerCase() === "presidentoffice"
    );
// إذا كان الرئيس يظهر كل شيء
if(isPresident){

    presidentButtons.forEach(btn=>{

        btn.style.display="flex";

    });

}

      //  });

 //   } else {

  //      presidentOnly.forEach(btn=>{
        //    if(btn) btn.remove();
     //   });

  //  }

//}

let selectedDrink = "", sugar = "", milk = "";

document.querySelectorAll(".drink").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".drink").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    selectedDrink = btn.dataset.drink;
  };
});

document.querySelectorAll(".sugar").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".sugar").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    sugar = btn.dataset.value;
  };
});

document.querySelectorAll(".milk").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".milk").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    milk = btn.dataset.value;
  };
});

document.getElementById("send").onclick=()=>{
  if(!selectedDrink){
    alert("اختاري المشروب");
    return;
  }
  if(!tableNumber){
    alert("رقم الطاولة غير موجود!");
    return;
  }

  push(ref(db,"orders"),{
    table: tableNumber,
    drink: selectedDrink,
    sugar,
    milk,
    notes: document.getElementById("notes").value,
    time: new Date().toLocaleTimeString()
  });

  alert("✅ Your Order has been sent");

  document.querySelectorAll(".drink, .sugar, .milk").forEach(b=>b.classList.remove("active"));
  selectedDrink = sugar = milk = "";
  document.getElementById("notes").value = "";
};
</script>

</body>
</html>
