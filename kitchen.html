<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شاشة المطبخ</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
button:hover{
  opacity:0.9;
}
</style>
</head>

<body class="bg-black text-white p-6">

<h1 class="text-3xl mb-6 text-center">👨‍🍳 شاشة المطبخ</h1>

<div id="orders" class="grid gap-4"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, remove } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// إعداد Firebase
const firebaseConfig = {
  apiKey:"AIzaSyCxOPyURMd40ee9XS-BudTELbJUjXyBUak",
  authDomain:"hospitality-43fca.firebaseapp.com",
  databaseURL:"https://hospitality-43fca-default-rtdb.firebaseio.com",
  projectId:"hospitality-43fca",
  storageBucket:"hospitality-43fca.firebasestorage.app",
  messagingSenderId:"1065891444452",
  appId:"1:1065891444452:web:8c5661e66e186ede115ef1"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ordersBox = document.getElementById("orders");

onValue(ref(db,"orders"), snapshot=>{
  ordersBox.innerHTML = "";
  if(!snapshot.exists()){
    ordersBox.innerHTML = "<p>لا توجد طلبات</p>";
    return;
  }

  snapshot.forEach(s=>{
    const o = s.val();
    const div = document.createElement("div");
    div.className="bg-orange-700 p-4 rounded";

    div.innerHTML=`
      <h3>طاولة ${o.table}</h3>
      <p>☕ ${o.drink}</p>
      <p>سكر: ${o.sugar||"بدون"}</p>
      <p>حليب: ${o.milk||"بدون"}</p>
      <p>${o.notes||""}</p>
      <p>${o.time}</p>
      <button class="bg-green-600 w-full mt-2 py-2 rounded">تم التنفيذ</button>
    `;

    const btn = div.querySelector("button");
    btn.onclick = ()=> remove(ref(db,"orders/"+s.key));

    ordersBox.appendChild(div);
  });
});

</script>
</body>
</html>
