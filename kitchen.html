<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Screen</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {
  background: linear-gradient(to bottom, #3b82f6, #ffffff); /* أزرق فاتح → أبيض */
}
</style>
</head>
<body class="min-h-screen p-6 flex flex-col items-center">

<div class="flex justify-center mb-6">
  <img src="caa_logo.png" class="h-20">
</div>

<h1 class="text-3xl font-bold mb-8 text-center text-blue-900">Kitchen Orders</h1>

<!-- شبكة الطلبات -->
<div id="orders" class="w-full grid gap-6 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
 apiKey:"AIzaSyCxOPyURMd40ee9XS-BudTELbJUjXyBUak",
 authDomain:"hospitality-43fca.firebaseapp.com",
 databaseURL:"https://hospitality-43fca-default-rtdb.firebaseio.com",
 projectId:"hospitality-43fca",
 storageBucket:"hospitality-43fca.firebasestorage.app",
 messagingSenderId:"1065891444452",
 appId:"1:1065891444452:web:8c5661e66e186ede115ef1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("orders");

onValue(ref(db,"orders"), snapshot => {
  container.innerHTML = "";
  if(!snapshot.exists()){
    container.innerHTML = "<p class='text-center text-blue-900 font-semibold'>لا توجد طلبات</p>";
    return;
  }

  const data = snapshot.val();
  Object.entries(data).forEach(([key, order]) => {
    const card = document.createElement("div");
    card.className = "bg-blue-900 text-white p-6 rounded-3xl shadow-2xl flex flex-col justify-between";

    card.innerHTML = `
      <div class="flex flex-col items-center mb-4">
        <div class="w-36 h-16 bg-blue-700 rounded-xl flex items-center justify-center font-bold text-white text-lg">
          Table ${order.table}
        </div>
      </div>

      <p class="font-semibold"><b>Drink:</b> ${order.drink}</p>
      <p class="font-semibold"><b>Sugar:</b> ${order.sugar || "-"}</p>
      <p class="font-semibold"><b>Milk:</b> ${order.milk || "-"}</p>
      <p class="mt-2">${order.notes || "-"}</p>
      <p class="text-sm text-yellow-300 mt-1">${order.time}</p>

      <button onclick="done('${key}')"
      class="w-full mt-4 py-3 bg-yellow-400 text-black font-bold rounded-xl hover:bg-yellow-300 transition">
      Completed
      </button>
    `;

    container.appendChild(card);
  });
});

window.done = (key) => {
  remove(ref(db,"orders/"+key));
};
</script>
</body>
</html>
